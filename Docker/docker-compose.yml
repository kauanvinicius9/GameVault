services:

  Back-End:
    build: ../Back-End

  Front-End:
    build: ../Front-End
    
  mongodb:
    image: mongo:8
    container_name: gamevault-mongo

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    
    volumes:
      - mongo_data:/data/db

  volumes:
    mongo_data: